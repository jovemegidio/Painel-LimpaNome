<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness Admin — Candidaturas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .career-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:12px;transition:all .2s}
        .career-card:hover{box-shadow:var(--shadow);border-color:var(--primary-light)}
        .career-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:12px}
        .career-name{font-size:1rem;font-weight:700;color:var(--text1)}
        .career-meta{font-size:.8rem;color:var(--text3);margin-top:2px}
        .career-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
        .career-field{font-size:.85rem;color:var(--text2)}
        .career-field label{font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);display:block;margin-bottom:2px}
        .career-msg{font-size:.85rem;color:var(--text2);line-height:1.6;background:var(--bg);padding:12px 16px;border-radius:8px;border:1px solid var(--border)}
        .career-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    </style>
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
            <div>
                <h2><i class="fas fa-briefcase" style="margin-right:8px;opacity:.4"></i>Candidaturas</h2>
                <p>Gerencie as candidaturas recebidas pelo formulário Trabalhe Conosco</p>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="card" style="margin-top:24px">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                <h3>Todas as Candidaturas</h3>
                <select id="filterStatus" class="form-control" style="max-width:180px" onchange="loadCareers()">
                    <option value="">Todos os Status</option>
                    <option value="nova">Nova</option>
                    <option value="em_analise">Em Análise</option>
                    <option value="entrevista">Entrevista</option>
                    <option value="aprovada">Aprovada</option>
                    <option value="rejeitada">Rejeitada</option>
                </select>
            </div>
            <div class="card-body" id="careersList">
                <div style="text-align:center;padding:40px;color:var(--text3)"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
            </div>
        </div>
    </template>

    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'admin-careers', title: 'Candidaturas', admin: true });

        let careersData = [];

        async function loadCareers() {
            const statusFilter = document.getElementById('filterStatus').value;
            const params = new URLSearchParams();
            if (statusFilter) params.set('status', statusFilter);

            const res = await DB.api('GET', '/api/admin/careers?' + params);
            if (!res) {
                document.getElementById('careersList').innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444">Erro ao carregar candidaturas</div>';
                return;
            }
            careersData = res.candidaturas || res.careers || [];
            renderStats();
            renderList();
        }

        function renderStats() {
            const counts = { nova: 0, em_analise: 0, entrevista: 0, aprovada: 0, rejeitada: 0 };
            careersData.forEach(c => { const s = c.status || 'nova'; counts[s] = (counts[s] || 0) + 1; });
            const items = [
                { icon: 'fa-inbox', color: '#6366f1', label: 'Novas', value: counts.nova },
                { icon: 'fa-search', color: '#f59e0b', label: 'Em Análise', value: counts.em_analise },
                { icon: 'fa-comments', color: '#3b82f6', label: 'Entrevista', value: counts.entrevista },
                { icon: 'fa-check-circle', color: '#10b981', label: 'Aprovadas', value: counts.aprovada },
                { icon: 'fa-times-circle', color: '#ef4444', label: 'Rejeitadas', value: counts.rejeitada }
            ];
            document.getElementById('statsGrid').innerHTML = items.map(s => `
                <div class="stat-card">
                    <div class="stat-icon" style="background:${s.color}20;color:${s.color}"><i class="fas ${s.icon}"></i></div>
                    <div class="stat-info"><span class="stat-value">${s.value}</span><span class="stat-label">${s.label}</span></div>
                </div>`).join('');
        }

        function renderList() {
            const container = document.getElementById('careersList');
            if (!careersData.length) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)"><i class="fas fa-inbox" style="font-size:2rem;opacity:.3;display:block;margin-bottom:12px"></i>Nenhuma candidatura encontrada</div>';
                return;
            }
            const stMap = { nova: 'info', em_analise: 'warning', entrevista: 'primary', aprovada: 'success', rejeitada: 'danger' };
            const stLabel = { nova: 'Nova', em_analise: 'Em Análise', entrevista: 'Entrevista', aprovada: 'Aprovada', rejeitada: 'Rejeitada' };
            container.innerHTML = careersData.map(c => `
                <div class="career-card">
                    <div class="career-header">
                        <div>
                            <div class="career-name">${esc(c.nome || c.name || '\u2014')}</div>
                            <div class="career-meta">${esc(c.email || '\u2014')} \u00b7 Enviada em ${c.created_at ? new Date(c.created_at).toLocaleDateString('pt-BR') : (c.data ? new Date(c.data).toLocaleDateString('pt-BR') : '\u2014')}</div>
                        </div>
                        <span class="badge badge-${stMap[c.status||'nova']||'secondary'}">${stLabel[c.status||'nova']||c.status||'Nova'}</span>
                    </div>
                    <div class="career-body">
                        <div class="career-field"><label>WhatsApp</label>${esc(c.whatsapp || c.telefone || '\u2014')}</div>
                        <div class="career-field"><label>Cidade</label>${esc(c.cidade || '\u2014')}</div>
                        <div class="career-field"><label>\u00c1rea</label>${esc(c.area || c.cargo || '\u2014')}</div>
                    </div>
                    ${(c.sobre || c.mensagem) ? `<div class="career-msg">${esc(c.sobre || c.mensagem)}</div>` : ''}
                    <div class="career-actions">
                        <button class="btn btn-sm btn-outline" onclick="updateStatus(${c.id},'em_analise')"><i class="fas fa-search"></i> Analisar</button>
                        <button class="btn btn-sm btn-primary" onclick="callInterview(${c.id})"><i class="fas fa-comments"></i> Entrevista</button>
                        <button class="btn btn-sm btn-success" onclick="updateStatus(${c.id},'aprovada')"><i class="fas fa-check"></i> Aprovar</button>
                        <button class="btn btn-sm btn-danger" onclick="updateStatus(${c.id},'rejeitada')"><i class="fas fa-times"></i> Rejeitar</button>
                        <button class="btn btn-sm btn-outline" onclick="deleteCareer(${c.id})" style="margin-left:auto"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        async function updateStatus(id, status) {
            const res = await DB.api('PUT', '/api/admin/careers/' + id, { status });
            if (res && res.success) {
                Layout.toast('Status atualizado!', 'success');
                loadCareers();
            } else {
                Layout.toast(res?.error || 'Erro ao atualizar', 'error');
            }
        }

        async function callInterview(id) {
            const c = careersData.find(x => x.id === id);
            if (!c) return;
            if (!confirm('Enviar convite de entrevista para ' + (c.nome || c.name) + '?')) return;
            const res = await DB.api('POST', '/api/admin/careers/interview', { email: c.email, nome: c.nome || c.name });
            if (res && res.success) {
                Layout.toast('Convite de entrevista enviado!', 'success');
                updateStatus(id, 'entrevista');
            } else {
                Layout.toast(res?.error || 'Erro ao enviar convite', 'error');
            }
        }

        async function deleteCareer(id) {
            if (!confirm('Deseja realmente excluir esta candidatura?')) return;
            const res = await DB.api('DELETE', '/api/admin/careers/' + id);
            if (res && res.success) {
                Layout.toast('Candidatura exclu\u00edda', 'success');
                loadCareers();
            } else {
                Layout.toast(res?.error || 'Erro ao excluir', 'error');
            }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        loadCareers();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
