<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Universidade</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Universidade Credbusiness</h2><p>Treinamentos e materiais de apoio para seu sucesso</p></div>

        <div class="tabs" style="margin-bottom:24px" id="catTabs">
            <div class="tab active" onclick="filterCat('todos', this)">Todos</div>
        </div>

        <div class="card" style="margin-bottom:24px">
            <div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
                <div style="flex:1;min-width:200px">
                    <h4 style="font-size:.9rem;margin-bottom:6px"><i class="fas fa-graduation-cap"></i> Seu Progresso</h4>
                    <div class="progress-bar" style="height:8px"><div class="progress-fill green" id="progressBar" style="width:0%"></div></div>
                </div>
                <div id="progressText" style="font-size:.85rem;color:var(--text3)">Carregando...</div>
            </div>
        </div>

        <div class="grid-3" id="videoGrid"><div class="empty-state" style="grid-column:1/-1"><i class="fas fa-spinner fa-spin"></i><p>Carregando cursos...</p></div></div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'universidade', title: 'Universidade' });

        let courses = [];
        let progress = { items: [], completed: 0, total: 0, percentage: 0 };
        let currentFilter = 'todos';

        async function loadData() {
            const [coursesData, progressData] = await Promise.all([
                DB.api('GET', '/api/university/courses'),
                DB.api('GET', '/api/university/progress')
            ]);
            courses = Array.isArray(coursesData) ? coursesData : [];
            if (progressData) progress = progressData;

            // Build category tabs dynamically
            const cats = [...new Set(courses.map(c => c.category).filter(Boolean))];
            const tabsEl = document.getElementById('catTabs');
            tabsEl.innerHTML = `<div class="tab active" onclick="filterCat('todos', this)">Todos</div>` +
                cats.map(c => `<div class="tab" onclick="filterCat('${c}', this)">${c.charAt(0).toUpperCase() + c.slice(1)}</div>`).join('');

            updateProgress();
            renderVideos('todos');
        }

        function updateProgress() {
            document.getElementById('progressBar').style.width = progress.percentage + '%';
            document.getElementById('progressText').textContent = `${progress.completed}/${progress.total} aulas concluídas (${progress.percentage}%)`;
        }

        function isCompleted(courseId) {
            return progress.items && progress.items.some(p => p.course_id === courseId && p.completed);
        }

        async function toggleWatched(courseId) {
            if (isCompleted(courseId)) {
                await DB.api('DELETE', '/api/university/progress/' + courseId);
            } else {
                await DB.api('POST', '/api/university/progress', { courseId });
            }
            const progressData = await DB.api('GET', '/api/university/progress');
            if (progressData) progress = progressData;
            updateProgress();
            renderVideos(currentFilter);
        }

        function filterCat(cat, el) {
            currentFilter = cat;
            document.querySelectorAll('#catTabs .tab').forEach(t => t.classList.remove('active'));
            if (el) el.classList.add('active');
            renderVideos(cat);
        }

        const catIcons = { geral: 'fa-book', marketing: 'fa-bullhorn', financeiro: 'fa-wallet', vendas: 'fa-chart-line', lideranca: 'fa-crown', plataforma: 'fa-laptop' };

        function renderVideos(cat) {
            const filtered = cat === 'todos' ? courses : courses.filter(v => v.category === cat);
            document.getElementById('videoGrid').innerHTML = filtered.length ? filtered.map(v => {
                const done = isCompleted(v.id);
                const icon = catIcons[v.category] || 'fa-play-circle';
                return `<div class="video-card ${done ? 'watched' : ''}" style="position:relative">
                    ${done ? '<div style="position:absolute;top:8px;right:8px;z-index:2"><span class="badge badge-success"><i class="fas fa-check"></i> Concluído</span></div>' : ''}
                    <div class="video-thumb" onclick="${v.video_url ? `window.open('${v.video_url}','_blank')` : ''}" style="cursor:${v.video_url ? 'pointer' : 'default'}">
                        <i class="fas ${icon}"></i>${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
                    </div>
                    <div class="video-info">
                        <h4>${v.title}</h4>
                        <p>${v.description || ''}</p>
                        <div style="display:flex;gap:8px;margin-top:8px">
                            ${v.video_url ? `<button class="btn btn-sm ${done ? 'btn-outline' : 'btn-primary'}" onclick="window.open('${v.video_url}','_blank')"><i class="fas fa-play"></i> ${done ? 'Reassistir' : 'Assistir'}</button>` : ''}
                            <button class="btn btn-sm ${done ? 'btn-success' : 'btn-outline'}" onclick="toggleWatched(${v.id})"><i class="fas ${done ? 'fa-check-circle' : 'fa-circle'}"></i> ${done ? 'Concluído' : 'Marcar'}</button>
                        </div>
                    </div>
                </div>`;
            }).join('') : '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-graduation-cap"></i><p>Nenhuma aula nesta categoria</p><small>Aguarde o administrador adicionar cursos</small></div>';
        }

        loadData();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
