<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Compras de Eventos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Compras de Eventos</h2><p>Histórico das suas compras de ingressos</p></div>

        <div class="card">
            <div class="card-header"><h3><i class="fas fa-shopping-cart"></i> Minhas Compras</h3></div>
            <div class="card-body"><div class="table-wrap" id="ordersTable">Carregando...</div></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'eventos-compras', title: 'Compras de Eventos' });

        (async () => {
            const orders = await DB.api('GET', '/api/wallet/events/orders') || [];
            const table = document.getElementById('ordersTable');

            if (!orders.length) {
                table.innerHTML = '<div class="table-empty"><i class="fas fa-shopping-cart"></i><p>Nenhuma compra realizada</p></div>';
                return;
            }

            table.innerHTML = `<table>
                <thead><tr><th>Pedido</th><th>Evento</th><th>Data</th><th>Qtd</th><th>Total</th><th>Status</th></tr></thead>
                <tbody>${orders.map(o => `<tr>
                    <td>#${o.id}</td>
                    <td><strong>${o.event_title}</strong><br><small>${o.event_date} ${o.event_time || ''}</small></td>
                    <td>${new Date(o.created_at).toLocaleDateString('pt-BR')}</td>
                    <td>${o.quantity}</td>
                    <td style="font-weight:700">${o.total > 0 ? 'R$ ' + fmt(o.total) : 'Grátis'}</td>
                    <td><span class="badge badge-${o.status==='confirmado'?'green':o.status==='pendente'?'orange':'red'}">${o.status}</span></td>
                </tr>`).join('')}</tbody>
            </table>`;
        })();
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
