<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credbusiness — Meu Endereço</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div id="app"></div>
<template id="page-content">
    <div class="page-header"><h2><i class="fas fa-map-marker-alt" style="color:var(--text3);margin-right:8px"></i>Meu Endereço</h2><p>Mantenha seu endereço atualizado para correspondências e documentos</p></div>

    <div class="card">
        <div class="card-header"><h3><i class="fas fa-home"></i> Endereço</h3></div>
        <div class="card-body">
            <form id="addressForm" onsubmit="saveAddress(event)">
                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label>CEP</label>
                        <input type="text" class="form-control" id="addrZip" maxlength="9" placeholder="00000-000" oninput="maskCep(this)" onblur="searchCep()">
                        <div class="form-hint">Digite o CEP para preencher automaticamente</div>
                    </div>
                    <div class="form-group" style="flex:4">
                        <label>Rua / Logradouro</label>
                        <input type="text" class="form-control" id="addrStreet" placeholder="Rua, Avenida, etc.">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1">
                        <label>Número</label>
                        <input type="text" class="form-control" id="addrNumber" placeholder="123">
                    </div>
                    <div class="form-group" style="flex:2">
                        <label>Complemento</label>
                        <input type="text" class="form-control" id="addrComplement" placeholder="Apto, Bloco, etc.">
                    </div>
                    <div class="form-group" style="flex:2">
                        <label>Bairro</label>
                        <input type="text" class="form-control" id="addrNeighborhood" placeholder="Bairro">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:3">
                        <label>Cidade</label>
                        <input type="text" class="form-control" id="addrCity" placeholder="Cidade">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Estado</label>
                        <select class="form-control" id="addrState">
                            <option value="">Selecione</option>
                            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                            <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                            <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                            <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                            <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                            <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                            <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                            <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                            <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>País</label>
                        <input type="text" class="form-control" id="addrCountry" value="BR" disabled style="opacity:.6">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> Salvar Endereço</button>
            </form>
        </div>
    </div>
</template>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script>
Layout.init({ basePath: '../', page: 'conta-endereco', title: 'Meu Endereço' });

async function loadAddress() {
    const data = await DB.getAddress();
    if (data) {
        document.getElementById('addrStreet').value = data.address_street || '';
        document.getElementById('addrNumber').value = data.address_number || '';
        document.getElementById('addrComplement').value = data.address_complement || '';
        document.getElementById('addrNeighborhood').value = data.address_neighborhood || '';
        document.getElementById('addrCity').value = data.address_city || '';
        document.getElementById('addrState').value = data.address_state || '';
        document.getElementById('addrZip').value = data.address_zip || '';
    }
}

function maskCep(el) {
    let v = el.value.replace(/\D/g, '').slice(0, 8);
    if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
    el.value = v;
}

async function searchCep() {
    const cep = document.getElementById('addrZip').value.replace(/\D/g, '');
    if (cep.length !== 8) return;
    try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();
        if (!data.erro) {
            document.getElementById('addrStreet').value = data.logradouro || '';
            document.getElementById('addrNeighborhood').value = data.bairro || '';
            document.getElementById('addrCity').value = data.localidade || '';
            document.getElementById('addrState').value = data.uf || '';
        }
    } catch {}
}

async function saveAddress(e) {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';

    const result = await DB.updateAddress({
        address_street: document.getElementById('addrStreet').value,
        address_number: document.getElementById('addrNumber').value,
        address_complement: document.getElementById('addrComplement').value,
        address_neighborhood: document.getElementById('addrNeighborhood').value,
        address_city: document.getElementById('addrCity').value,
        address_state: document.getElementById('addrState').value,
        address_zip: document.getElementById('addrZip').value,
        address_country: 'BR'
    });

    btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Salvar Endereço';
    if (result && result.success) {
        Layout.toast('Endereço salvo com sucesso!', 'success');
    } else {
        Layout.toast(result?.error || 'Erro ao salvar endereço', 'error');
    }
}

loadAddress();
</script>
</body>
</html>
