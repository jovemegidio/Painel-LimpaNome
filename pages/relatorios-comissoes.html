<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI2 — Comissões</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Relatório de Comissões</h2><p>Histórico de comissões recebidas da sua rede</p></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-hand-holding-usd"></i></div><div class="stat-info"><h3 id="totalComm"></h3><p>Total Comissões</p></div></div>
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-calendar"></i></div><div class="stat-info"><h3 id="monthComm"></h3><p>Comissão do Mês</p></div></div>
        </div>
        <div class="card"><div class="card-body"><div class="table-wrap" id="commTable"></div></div></div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'relatorios-comissoes', title: 'Comissões' });
        const user = Layout.user;
        const tx = DB.getTransactions(user.id).filter(t => t.type === 'comissao' || t.type === 'bonus');
        const total = tx.reduce((s, t) => s + Math.abs(t.amount), 0);

        document.getElementById('totalComm').textContent = 'R$ ' + fmt(total);
        document.getElementById('monthComm').textContent = 'R$ ' + fmt(tx.filter(t => t.date.startsWith('2026-03')).reduce((s, t) => s + Math.abs(t.amount), 0));

        document.getElementById('commTable').innerHTML = tx.length ? `<table>
            <thead><tr><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead>
            <tbody>${tx.map(t => `<tr>
                <td><span class="badge badge-${t.type==='bonus'?'green':'blue'}">${t.type}</span></td>
                <td>${t.description}</td>
                <td style="font-weight:700;color:var(--success)">+R$ ${fmt(Math.abs(t.amount))}</td>
                <td><span class="badge badge-green">${t.status}</span></td>
                <td>${t.date}</td>
            </tr>`).join('')}</tbody>
        </table>` : '<div class="table-empty"><i class="fas fa-hand-holding-usd"></i><p>Nenhuma comissão</p></div>';
    </script>
</body>
</html>
