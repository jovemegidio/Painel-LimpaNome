<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credbusiness — Clientes da Rede</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Clientes da Rede</h2><p>Usuários da sua rede que adquiriram pacotes</p></div>

        <div class="grid-3 mb-24">
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-users"></i></div><div class="stat-info"><div class="stat-value" id="totalNetwork">0</div><div class="stat-label">Total na Rede</div></div></div>
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-user-check"></i></div><div class="stat-info"><div class="stat-value" id="totalClients">0</div><div class="stat-label">Clientes Ativos</div></div></div>
            <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-percentage"></i></div><div class="stat-info"><div class="stat-value" id="conversionRate">0%</div><div class="stat-label">Taxa de Conversão</div></div></div>
        </div>

        <div class="card">
            <div class="card-header"><h3><i class="fas fa-user-check"></i> Lista de Clientes</h3></div>
            <div class="card-body"><div class="table-wrap" id="clientsTable">Carregando...</div></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'rede-clientes', title: 'Clientes da Rede' });

        (async () => {
            const data = await DB.api('GET', '/api/wallet/network/clients');
            if (!data) { Layout.toast('Erro ao carregar dados', 'error'); return; }

            document.getElementById('totalNetwork').textContent = data.total || 0;
            document.getElementById('totalClients').textContent = data.totalClients || 0;
            const rate = data.total > 0 ? ((data.totalClients / data.total) * 100).toFixed(1) : 0;
            document.getElementById('conversionRate').textContent = rate + '%';

            const table = document.getElementById('clientsTable');
            const clients = data.clients || [];

            if (!clients.length) {
                table.innerHTML = '<div class="table-empty"><i class="fas fa-user-check"></i><p>Nenhum cliente na sua rede ainda</p></div>';
                return;
            }

            const levels = DB.get('levels') || {};
            table.innerHTML = `<table>
                <thead><tr><th>Nome</th><th>Username</th><th>Nível</th><th>Pacotes Ativos</th><th>Status</th><th>Desde</th></tr></thead>
                <tbody>${clients.map(c => {
                    const lvl = levels[c.level] || {};
                    return `<tr>
                        <td><strong>${c.name}</strong></td>
                        <td>@${c.username}</td>
                        <td><span style="color:${lvl.color || '#999'}">${lvl.icon || ''} ${lvl.name || c.level}</span></td>
                        <td><span class="badge badge-green">${c.active_packages}</span></td>
                        <td><span class="badge badge-${c.active?'green':'red'}">${c.active?'Ativo':'Inativo'}</span></td>
                        <td>${c.created_at ? new Date(c.created_at).toLocaleDateString('pt-BR') : ''}</td>
                    </tr>`;
                }).join('')}</tbody>
            </table>`;
        })();
    </script>
</body>
</html>
