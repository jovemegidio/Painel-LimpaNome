<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI2 — Consulta Bacen</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app"></div>
    <template id="page-content">
        <div class="page-header"><h2>Bacen — Consulta de Valores</h2><p>Consulte valores a receber no Banco Central</p></div>
        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-university"></i> Consultar Bacen</h3></div>
                <div class="card-body">
                    <div class="form-group"><label>CPF / CNPJ</label><input class="form-control" id="bacenDoc" placeholder="000.000.000-00"></div>
                    <div class="form-group"><label>Data de Nascimento</label><input type="date" class="form-control" id="bacenDate"></div>
                    <button class="btn btn-primary w-full" onclick="consultarBacen()"><i class="fas fa-search"></i> Consultar</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-question-circle"></i> O que é?</h3></div>
                <div class="card-body">
                    <p style="font-size:.85rem;color:var(--text2);margin-bottom:12px">O Sistema de Valores a Receber (SVR) do Banco Central permite consultar se existem valores esquecidos em bancos e instituições financeiras.</p>
                    <p style="font-size:.85rem;color:var(--text2)">Podem ser consultados: contas correntes/poupança encerradas com saldo, cotas de capital, tarifas cobradas indevidamente, entre outros.</p>
                </div>
            </div>
        </div>
        <div class="card" style="margin-top:24px;display:none" id="bacenResult">
            <div class="card-header"><h3><i class="fas fa-coins"></i> Resultado</h3></div>
            <div class="card-body" id="bacenBody"></div>
        </div>
    </template>
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        Layout.init({ basePath: '../', page: 'bacen-consulta', title: 'Bacen' });

        function consultarBacen() {
            const doc = document.getElementById('bacenDoc').value;
            if (!doc) { Layout.toast('Informe o CPF/CNPJ', 'error'); return; }
            Layout.toast('Consultando Banco Central...', 'info');
            setTimeout(() => {
                const result = document.getElementById('bacenResult');
                result.style.display = 'block';
                const val = (Math.random() * 500 + 50).toFixed(2);
                document.getElementById('bacenBody').innerHTML = `
                    <div style="text-align:center;padding:24px">
                        <div style="font-size:3rem;margin-bottom:8px"><i class="fas fa-coins" style="color:var(--warning)"></i></div>
                        <h3 style="font-size:1.3rem;margin-bottom:4px">Valores Encontrados!</h3>
                        <p style="font-size:2rem;font-weight:700;color:var(--success);margin:12px 0">R$ ${val}</p>
                        <p style="font-size:.85rem;color:var(--text3)">Existem valores a receber para o documento informado</p>
                        <button class="btn btn-success" style="margin-top:16px"><i class="fas fa-download"></i> Solicitar Resgate</button>
                    </div>`;
                result.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        }
    </script>
</body>
</html>
