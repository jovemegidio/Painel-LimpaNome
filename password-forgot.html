<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI2 — Recuperar Senha</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="brand-icon">MI2</div>
            <h2>Recuperar Senha</h2>
            <p>Informe seus dados para redefinir sua senha</p>
        </div>

        <form id="recoverForm" onsubmit="doRecover(event)">
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right:6px;opacity:.4"></i>Usuário</label>
                <input type="text" class="form-control" id="recUser" placeholder="Seu nome de usuário" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope" style="margin-right:6px;opacity:.4"></i>E-mail</label>
                <input type="email" class="form-control" id="recEmail" placeholder="E-mail cadastrado" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="recBtn" style="padding:12px;font-size:.95rem">
                <span class="btn-text">Recuperar Senha</span>
                <i class="fas fa-spinner fa-spin" style="display:none"></i>
            </button>
        </form>

        <!-- Success message (hidden) -->
        <div id="successMsg" style="display:none;text-align:center;padding:20px 0">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--success-bg);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">
                <i class="fas fa-check" style="font-size:1.5rem;color:var(--success)"></i>
            </div>
            <h3 style="margin-bottom:8px">Senha Redefinida!</h3>
            <p style="color:var(--text3);font-size:.875rem;margin-bottom:4px">Sua senha foi redefinida com sucesso.</p>
            <p id="newPassMsg" style="font-weight:600;font-size:1rem;color:var(--primary);background:var(--primary-light);padding:10px;border-radius:var(--radius);margin:12px 0"></p>
            <p style="color:var(--text3);font-size:.82rem">Use essa senha para fazer login e altere nas configurações.</p>
        </div>

        <div class="login-footer">
            <a href="login.html"><i class="fas fa-arrow-left" style="margin-right:4px"></i> Voltar ao login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/data.js"></script>
<script>
    DB.init();
    const _s = DB.getSettings();
    document.title = (_s.siteName||'MI2') + ' — Recuperar Senha';
    const _bi = document.querySelector('.login-brand .brand-icon');
    if (_bi) _bi.textContent = _s.logoText || 'MI2';

    function doRecover(e) {
        e.preventDefault();
        const btn = document.getElementById('recBtn');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.fa-spin').style.display = 'inline-block';
        btn.disabled = true;

        setTimeout(() => {
            const result = DB.recoverPassword(
                document.getElementById('recUser').value.toLowerCase().trim(),
                document.getElementById('recEmail').value.trim()
            );

            if (result.success) {
                document.getElementById('recoverForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('newPassMsg').textContent = 'Nova senha: ' + result.message.split(': ')[1];
            } else {
                showToast(result.error, 'error');
                btn.querySelector('.btn-text').style.display = 'inline';
                btn.querySelector('.fa-spin').style.display = 'none';
                btn.disabled = false;
            }
        }, 1000);
    }

    function showToast(msg, type) {
        const c = document.getElementById('toastContainer');
        const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
        const el = document.createElement('div');
        el.className = 'toast ' + type;
        el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
        c.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3500);
    }
</script>
</body>
</html>
