<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Credbusiness">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>Credbusiness — Contrato</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f8fafc;color:#334155;min-height:100vh;display:flex;flex-direction:column}
        .topbar{background:linear-gradient(135deg,#6366f1,#4f46e5);padding:16px 24px;color:#fff;display:flex;align-items:center;gap:12px}
        .topbar img{height:32px}
        .topbar h1{font-size:1.1rem;font-weight:700;letter-spacing:-.3px}
        .container{max-width:900px;width:100%;margin:32px auto;padding:0 16px;flex:1}
        .contract-box{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden}
        .contract-header{padding:32px 40px;border-bottom:1px solid #e2e8f0;text-align:center}
        .contract-header h2{font-size:1.4rem;font-weight:700;color:#1e293b;margin-bottom:6px}
        .contract-header .meta{font-size:.82rem;color:#94a3b8;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
        .contract-body{padding:40px 48px;font-size:.9rem;line-height:1.9;color:#475569}
        .contract-body h3{color:#1e293b;margin-top:28px;margin-bottom:8px;font-size:1rem}
        .contract-body p{margin-bottom:14px}
        .contract-body ul,.contract-body ol{margin-bottom:14px;padding-left:24px}
        .contract-body li{margin-bottom:6px}
        .contract-footer{padding:24px 40px;border-top:1px solid #e2e8f0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;background:#f8fafc}
        .btn{padding:10px 24px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
        .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
        .btn-outline{background:transparent;color:#6366f1;border:1px solid #e2e8f0}.btn-outline:hover{background:#eef2ff}
        .loading{text-align:center;padding:80px 20px;color:#94a3b8;font-size:1rem}
        .loading i{font-size:2rem;margin-bottom:16px;display:block}
        .error-state{text-align:center;padding:80px 20px;color:#ef4444}
        .error-state i{font-size:2.5rem;margin-bottom:16px;display:block;opacity:.6}
        .error-state h3{font-size:1.1rem;margin-bottom:8px;color:#1e293b}
        .error-state p{font-size:.88rem;color:#94a3b8}
        .page-footer{text-align:center;padding:24px;font-size:.78rem;color:#94a3b8}
        @media print{
            @page{size:A4;margin:20mm 18mm 25mm 18mm}
            body{background:#fff;min-height:auto;display:block}
            .topbar,.contract-footer,.page-footer,.accept-section{display:none!important}
            .print-header{display:flex!important;align-items:center;justify-content:space-between;border-bottom:2px solid #1a1a2e;padding-bottom:12px;margin-bottom:20px}
            .print-header .print-logo{font-size:1.2rem;font-weight:800;color:#1a1a2e;letter-spacing:-.5px}
            .print-header .print-info{text-align:right;font-size:.7rem;color:#64748b;line-height:1.5}
            .container{margin:0;max-width:100%;padding:0}
            .contract-box{box-shadow:none;border-radius:0;border:none}
            .contract-header{padding:16px 0;border-bottom:1px solid #ccc}
            .contract-header h2{font-size:1.2rem;color:#000}
            .contract-header .meta{color:#555}
            .contract-body{padding:20px 0;font-size:.82rem;line-height:1.7;color:#000}
            .contract-body h3{color:#000;font-size:.92rem;margin-top:18px;margin-bottom:6px;border-left-color:#333!important}
            .contract-body p{margin-bottom:10px;orphans:3;widows:3}
            .contract-body h3{page-break-after:avoid}
            .print-signature{display:flex!important;justify-content:space-between;margin-top:40px;padding-top:20px;border-top:1px solid #ccc;gap:40px}
            .print-signature .sig-block{flex:1;text-align:center;padding-top:60px;border-top:1px solid #333;font-size:.78rem;color:#333;line-height:1.4}
            .print-footer{display:block!important;text-align:center;font-size:.68rem;color:#999;margin-top:24px;padding-top:10px;border-top:1px solid #e5e5e5}
        }
        .print-header,.print-signature,.print-footer{display:none}
        .accept-section{padding:32px 40px;border-top:2px solid #e2e8f0;background:#f8fafc}
        .accept-section h3{font-size:1.1rem;font-weight:700;color:#1e293b;margin-bottom:6px}
        .accept-section>p{font-size:.85rem;color:#64748b;margin-bottom:20px}
        .accept-form{display:flex;flex-direction:column;gap:16px}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group label{font-size:.82rem;font-weight:600;color:#475569}
        .form-group input{padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:.88rem;font-family:inherit;transition:border .2s;outline:none}
        .form-group input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .checkbox-label{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:#334155;cursor:pointer;padding:12px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px}
        .checkbox-label input{margin-top:2px;accent-color:#6366f1;width:18px;height:18px;flex-shrink:0}
        .btn-accept{background:#10b981;color:#fff;padding:14px 32px;border-radius:10px;font-weight:700;font-size:.92rem;width:100%;justify-content:center}
        .btn-accept:hover:not(:disabled){background:#059669}
        .btn-accept:disabled{opacity:.5;cursor:not-allowed}
        .accept-success{text-align:center;padding:32px 20px}
        .accept-success i{font-size:3rem;color:#10b981;margin-bottom:12px;display:block}
        .accept-success h3{font-size:1.15rem;color:#1e293b;margin-bottom:8px}
        .accept-success p{font-size:.88rem;color:#64748b;margin-bottom:8px}
        .accept-meta{font-size:.78rem!important;color:#94a3b8!important;margin-top:16px!important}
        @media(max-width:768px){
            .contract-header{padding:20px 20px}
            .contract-body{padding:20px 20px;font-size:.85rem;line-height:1.7}
            .contract-footer{padding:16px 20px}
            .accept-section{padding:20px 20px}
            .form-row{grid-template-columns:1fr}
            .container{margin:16px auto}
        }
    </style>
</head>
<body>
    <div class="topbar">
        <i class="fas fa-file-contract" style="font-size:1.3rem"></i>
        <h1>Credbusiness</h1>
    </div>

    <div class="container">
        <div class="contract-box" id="contractBox">
            <div class="loading" id="loadingState">
                <i class="fas fa-spinner fa-spin"></i>
                Carregando contrato...
            </div>
        </div>
    </div>

    <div class="page-footer">
        &copy; 2026 Credbusiness — Documento gerado eletronicamente
    </div>

    <script>
    let contractId = null;

    (async function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        contractId = id;
        const box = document.getElementById('contractBox');

        if (!id) {
            box.innerHTML = '<div class="error-state"><i class="fas fa-exclamation-circle"></i><h3>Contrato não especificado</h3><p>O link está incompleto. Solicite um novo link ao seu consultor.</p></div>';
            return;
        }

        try {
            const baseUrl = window.location.origin;
            const resp = await fetch(baseUrl + '/api/contracts/public/' + encodeURIComponent(id));
            if (!resp.ok) throw new Error('not_found');
            const c = await resp.json();
            if (!c || c.error) throw new Error('not_found');

            document.title = 'Credbusiness \u2014 ' + c.title;

            box.innerHTML = `
                <div class="print-header">
                    <div class="print-logo">CREDBUSINESS</div>
                    <div class="print-info">Consultoria e Assessoria Jur\u00eddica<br>CNPJ: Credbusiness Consultoria<br>Data de emiss\u00e3o: ${new Date().toLocaleDateString('pt-BR')}</div>
                </div>
                <div class="contract-header">
                    <h2>${esc(c.title)}</h2>
                    <div class="meta">
                        <span><i class="fas fa-code-branch"></i> Vers\u00e3o ${esc(c.version || '1.0')}</span>
                        <span><i class="fas fa-calendar"></i> ${new Date(c.created_at).toLocaleDateString('pt-BR')}</span>
                    </div>
                </div>
                <div class="contract-body">${c.content || '<p>Conte\u00fado n\u00e3o dispon\u00edvel.</p>'}</div>
                <div class="print-signature">
                    <div class="sig-block">CONTRATADA<br><strong>Credbusiness Consultoria</strong></div>
                    <div class="sig-block">CONTRATANTE<br><strong>______________________________</strong><br>Nome / CPF</div>
                </div>
                <div class="print-footer">Credbusiness \u2014 Documento gerado eletronicamente em ${new Date().toLocaleDateString('pt-BR')} \u00e0s ${new Date().toLocaleTimeString('pt-BR')}</div>
                <div class="accept-section" id="acceptSection">
                    <h3><i class="fas fa-file-signature"></i> Aceite do Contrato</h3>
                    <p>Preencha seus dados abaixo para registrar o aceite deste contrato.</p>
                    <div class="accept-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nome Completo *</label>
                                <input type="text" id="acceptName" placeholder="Seu nome completo" required>
                            </div>
                            <div class="form-group">
                                <label>CPF *</label>
                                <input type="text" id="acceptCpf" placeholder="000.000.000-00" maxlength="14" oninput="maskCpf(this)" required>
                            </div>
                        </div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="acceptCheck">
                            <span>Li e concordo com todos os termos deste contrato</span>
                        </label>
                        <button class="btn btn-accept" id="acceptBtn" onclick="acceptContract()" disabled>
                            <i class="fas fa-check-circle"></i> Aceitar Contrato
                        </button>
                    </div>
                </div>
                <div class="contract-footer">
                    <button class="btn btn-outline" onclick="window.print()"><i class="fas fa-print"></i> Imprimir</button>
                </div>
            `;

            document.getElementById('acceptCheck').addEventListener('change', function() {
                document.getElementById('acceptBtn').disabled = !this.checked;
            });
        } catch(e) {
            box.innerHTML = '<div class="error-state"><i class="fas fa-file-excel"></i><h3>Contrato n\u00e3o encontrado</h3><p>Este contrato n\u00e3o existe ou n\u00e3o est\u00e1 mais dispon\u00edvel. Solicite um novo link ao seu consultor.</p></div>';
        }
    })();

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    function maskCpf(el) {
        let v = el.value.replace(/\D/g, '').slice(0, 11);
        if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
        else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
        else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
        el.value = v;
    }

    async function acceptContract() {
        const name = document.getElementById('acceptName').value.trim();
        const cpf = document.getElementById('acceptCpf').value.trim();
        const check = document.getElementById('acceptCheck').checked;

        if (!name) { alert('Informe seu nome completo.'); return; }
        if (cpf.replace(/\D/g, '').length !== 11) { alert('Informe um CPF v\u00e1lido.'); return; }
        if (!check) { alert('Voc\u00ea precisa concordar com os termos.'); return; }

        const btn = document.getElementById('acceptBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';

        try {
            const resp = await fetch(window.location.origin + '/api/contracts/public/' + contractId + '/accept', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, cpf })
            });
            const result = await resp.json();
            if (result.success) {
                document.getElementById('acceptSection').innerHTML = `
                    <div class="accept-success">
                        <i class="fas fa-check-circle"></i>
                        <h3>${result.alreadyAccepted ? 'Contrato j\u00e1 aceito' : 'Contrato aceito com sucesso!'}</h3>
                        <p>${result.alreadyAccepted ? 'Este CPF j\u00e1 registrou o aceite deste contrato anteriormente.' : 'Seu aceite foi registrado. Voc\u00ea pode imprimir este documento para seus registros.'}</p>
                        <p class="accept-meta"><i class="fas fa-user"></i> ${esc(name)} &nbsp; <i class="fas fa-id-card"></i> ${esc(cpf)} &nbsp; <i class="fas fa-clock"></i> ${new Date().toLocaleString('pt-BR')}</p>
                    </div>
                `;
            } else {
                alert(result.error || 'Erro ao aceitar contrato.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Aceitar Contrato';
            }
        } catch(e) {
            alert('Erro de conex\u00e3o. Tente novamente.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Aceitar Contrato';
        }
    }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
